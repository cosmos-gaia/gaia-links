<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@cosmos.project | Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* * RESET & BASE TYPOGRAPHY 
         * Menggunakan system-ui untuk font default ala Apple (San Francisco)
         */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Warna fallback sebelum background dimuat */
            background-color: #3b4252; 
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* * BACKGROUND PLACEHOLDER 
         * Area ini dikhususkan untuk Video, GIF, atau Gambar latar belakang.
         * Saat ini menggunakan gradient generik sebagai placeholder visual.
         */
        #background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* HAPUS background di bawah ini dan ganti dengan properti gambarmu atau sisipkan <video> di HTML */
            
            background-size: cover;
            background-position: center;
        }

        /* MAIN CONTAINER */
        .container {
            width: 100%;
            max-width: 680px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* TOP ACTIONS (Share & Asterisk) */
        .top-actions {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .icon-btn:hover { opacity: 0.8; }

        /* PROFILE SECTION */
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            /* Placeholder styling */
            background-color: #1e1e1e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .username {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .bio {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 16px;
        }

        .social-icons a {
            color: #fff;
            font-size: 24px;
            text-decoration: none;
            margin: 0 10px;
            transition: transform 0.2s;
        }
        .social-icons a:hover { transform: scale(1.1); }

        /* * LINKS SECTION - THE LIQUID GLASS THEME 
         */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .glass-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 18px 24px;
            border-radius: 35px; /* Pill-shaped */
            text-decoration: none;
            color: #ffffff;
            
            /* Apple/iOS Liquid Glass Core Dynamics */
            background: rgba(255, 255, 255, 0.08); /* Transparansi rendah untuk efek kedalaman */
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%); /* Safari Support */
            border: 1px solid rgba(255, 255, 255, 0.15); /* Simulasi pantulan tepi kaca */
            box-shadow: 
                0 4px 24px -1px rgba(0, 0, 0, 0.15), /* Soft shadow luar */
                inset 0 1px 1px rgba(255, 255, 255, 0.2); /* Inner glow tipis */

            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        /* Hover Effect: Sedikit memperterang material kaca */
        .glass-btn:hover {
            transform: scale(1.015);
            background: rgba(255, 255, 255, 0.12);
        }

        /* Active Effect (saat ditekan) */
        .glass-btn:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Flexbox Structuring untuk isi Tombol */
        .btn-icon-left {
            width: 30px;
            font-size: 20px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            color: #ffffff; /* Memastikan icon warna putih */
        }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.3px;
            padding: 0 10px;
        }

        .btn-icon-right {
            width: 30px;
            font-size: 16px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            color: rgba(255, 255, 255, 0.6); /* Warna titik tiga sedikit redup */
        }
    </style>
</head>
<body>

    <div id="background-layer">
    <video autoplay loop muted playsinline id="bg-video">
        
        <source src="assets/landscape.webm" type="video/webm" media="(min-width: 768px)">
        
        <source src="assets/portrait.webm" type="video/webm" media="(max-width: 767px)">
        
    </video>
</div>

    <div class="container">
        
        <div class="top-actions">
            <button class="icon-btn" aria-label="Menu"><i class="fa-solid fa-asterisk"></i></button>
            <button class="icon-btn" aria-label="Share"><i class="fa-solid fa-arrow-up-from-bracket"></i></button>
        </div>

        <div class="profile-header">
            <img src="https://instagram.fdps19-1.fna.fbcdn.net/v/t51.82787-19/637705920_18085000643336230_6887420160986080424_n.jpg?efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLmRqYW5nby4xMDgwLmMyIn0&_nc_ht=instagram.fdps19-1.fna.fbcdn.net&_nc_cat=110&_nc_oc=Q6cZ2gHFJS1oQQAuCdhHvq1ghz2nSVens82yT_iATUPj9qK6X_wcu5nvY_zJ4YFUbXbmjcw&_nc_ohc=0lAbfs2X6AQQ7kNvwHvgVRz&_nc_gid=LIRVDBkBFDOvN3kc7nX2iA&edm=AP4sbd4BAAAA&ccb=7-5&oh=00_AfyYIvuXQ7PB96rxZ8_5epoE_xCCqoSld-Ng0vM_Eq93Xw&oe=69CF36AA&_nc_sid=7a9f4b" alt="Profile Picture" class="profile-pic">
            
            <h1 class="username">@cosmos.project</h1>
            <p class="bio">Just some of my project<br>and late-nights ideas.</p>
            
            <div class="social-icons">
                <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>

        <div class="links-container">
            
            <a href="https://www.instructables.com/ESP8266-Prototype-MIDI-Controller-Via-USB-With-1-B/" class="glass-btn">
                <div class="btn-icon-left">
                    <i class="fa-solid fa-microchip"></i> </div>
                <div class="btn-text">ESP8266 MIDI Controller (Instructable)</div>
                <div class="btn-icon-right"><i class="fa-solid fa-ellipsis-vertical"></i></div>
            </a>

            <a href="https://cosmos-gaia.github.io/plasma-ion.github.io/" class="glass-btn">
                <div class="btn-icon-left">
                    <i class="fa-brands fa-github"></i>
                </div>
                <div class="btn-text">Plasma-biotic Ion Theory</div>
                <div class="btn-icon-right"><i class="fa-solid fa-ellipsis-vertical"></i></div>
            </a>

            <a href="https://github.com/cosmos-gaia/esp8266-midicontrol-usb" class="glass-btn">
                <div class="btn-icon-left">
                    <i class="fa-brands fa-github"></i>
                </div>
                <div class="btn-text">ESP8266 MIDI Controller</div>
                <div class="btn-icon-right"><i class="fa-solid fa-ellipsis-vertical"></i></div>
            </a>

            <a href="https://soundcloud.com/gaia-instrument" class="glass-btn">
                <div class="btn-icon-left">
                    <i class="fa-brands fa-soundcloud"></i>
                </div>
                <div class="btn-text">Soundcloud</div>
                <div class="btn-icon-right"><i class="fa-solid fa-ellipsis-vertical"></i></div>
            </a>

        </div>

    </div>

</body>
</html>
